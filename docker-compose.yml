version: '3.8'

services:
  plex2jf:
    build: .
    container_name: plex2jf
    restart: unless-stopped
    environment:
      - PLEX_URL=${PLEX_URL:-http://plex:32400}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - SEERR_URL=${SEERR_URL:-http://seerr:5055}
      - SEERR_API_KEY=${SEERR_API_KEY}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    networks:
      - plex2jf

networks:
  plex2jf:
    driver: bridge
